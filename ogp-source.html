<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: "Yu Gothic UI", "Yu Gothic Medium", "Yu Gothic", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
  }
  .card {
    width: 1200px; height: 630px; position: relative;
    background: linear-gradient(135deg, #14273f 0%, #1e3a5f 62%, #23453a 100%);
    color: #fff; overflow: hidden;
  }
  /* decorative teal shapes */
  .deco-ring {
    position: absolute; border-radius: 50%; border: 2px solid rgba(79,179,171,0.28);
  }
  .ring1 { width: 520px; height: 520px; top: -180px; right: -140px; }
  .ring2 { width: 340px; height: 340px; top: -60px; right: -20px; border-color: rgba(79,179,171,0.18); }

  .badge {
    position: absolute; right: 92px; top: 168px;
  }
  .eyebrow {
    position: absolute; left: 90px; top: 90px;
    font-size: 20px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
    color: #6cc9c1; background: rgba(255,255,255,0.08);
    padding: 8px 18px; border-radius: 4px; display: inline-block;
  }
  h1 {
    position: absolute; left: 90px; top: 200px; width: 760px;
    font-size: 58px; font-weight: 800; line-height: 1.42; text-shadow: 0 2px 10px rgba(0,0,0,0.25);
  }
  .tagline {
    position: absolute; left: 90px; top: 448px; width: 720px;
    font-size: 26px; font-weight: 600; color: rgba(255,255,255,0.86); line-height: 1.6;
  }
  .brand {
    position: absolute; left: 90px; bottom: 46px;
    font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.65); letter-spacing: 0.03em;
  }
  .brand .dot { color: #2f8f88; margin: 0 10px; }
</style>
</head>
<body>
  <div class="card">
    <div class="deco-ring ring1"></div>
    <div class="deco-ring ring2"></div>

    <svg class="badge" width="230" height="230" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g transform="translate(200,150)">
        <polygon points="0,-108 94,-54 94,54 0,108 -94,54 -94,-54" fill="#2f8f88" opacity="0.95"/>
        <polygon points="0,-76 64,-38 64,38 0,76 -64,38 -64,-38" fill="#14273f"/>
        <path d="M-30,0 L-8,26 L34,-22" stroke="#ffffff" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <polygon points="-34,104 0,76 34,104 22,178 0,150 -22,178" fill="#c98c53"/>
      </g>
    </svg>

    <p class="eyebrow">マイクロクレデンシャル導入支援</p>
    <h1>制度設計から定着まで、<br>伴走支援します。</h1>
    <p class="tagline">教育行政や大学実務の経験者が、<br>大学・専門学校・企業の導入を支援。初回相談無料。</p>
    <p class="brand">マイクロクレデンシャル・プラクティショナー</p>
  </div>
</body>
</html>
